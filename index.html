<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase Google 登入測試</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      padding: 20px;
      max-width: 420px;
      margin: auto;
      background: #f5f5f5;
    }

    h1 {
      font-size: 24px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }

    button {
      cursor: pointer;
    }

    .box {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-top: 16px;
    }

    .small {
      color: #666;
      font-size: 14px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Firebase Google 登入測試</h1>

  <div id="loginArea" class="box">
    <button id="googleLoginBtn">使用 Google 登入</button>
  </div>

  <div id="userArea" class="box" style="display:none;">
    <p>目前登入：</p>
    <strong id="userEmail"></strong>
    <p class="small">UID：<span id="userUid"></span></p>

    <input id="testText" placeholder="輸入測試資料，例如：這是我的資料" />

    <button id="saveBtn">儲存到自己的雲端</button>
    <button id="loadBtn">讀取自己的雲端資料</button>
    <button id="logoutBtn">登出</button>

    <hr />

    <p>雲端資料：</p>
    <strong id="cloudData">尚未讀取</strong>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyABQadKr-Am-55GgFJmhZ0tkRY-joARNAQ",
      authDomain: "k89150-web-login.firebaseapp.com",
      projectId: "k89150-web-login",
      storageBucket: "k89150-web-login.firebasestorage.app",
      messagingSenderId: "488040360398",
      appId: "1:488040360398:web:759698c16eb67e14f1639f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);

    const loginArea = document.getElementById("loginArea");
    const userArea = document.getElementById("userArea");
    const userEmail = document.getElementById("userEmail");
    const userUid = document.getElementById("userUid");
    const testText = document.getElementById("testText");
    const cloudData = document.getElementById("cloudData");

    document.getElementById("googleLoginBtn").addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        alert("Google 登入失敗：" + error.message);
        console.error(error);
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const user = auth.currentUser;

      if (!user) {
        alert("尚未登入");
        return;
      }

      try {
        await setDoc(doc(db, "users", user.uid, "appData", "main"), {
          text: testText.value,
          email: user.email,
          updatedAt: new Date().toISOString()
        });

        alert("已儲存到自己的雲端");
      } catch (error) {
        alert("儲存失敗：" + error.message);
        console.error(error);
      }
    });

    document.getElementById("loadBtn").addEventListener("click", async () => {
      const user = auth.currentUser;

      if (!user) {
        alert("尚未登入");
        return;
      }

      try {
        const snap = await getDoc(doc(db, "users", user.uid, "appData", "main"));

        if (snap.exists()) {
          cloudData.textContent = snap.data().text || "沒有文字資料";
        } else {
          cloudData.textContent = "目前沒有資料";
        }
      } catch (error) {
        alert("讀取失敗：" + error.message);
        console.error(error);
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginArea.style.display = "none";
        userArea.style.display = "block";
        userEmail.textContent = user.email;
        userUid.textContent = user.uid;
      } else {
        loginArea.style.display = "block";
        userArea.style.display = "none";
        userEmail.textContent = "";
        userUid.textContent = "";
        cloudData.textContent = "尚未讀取";
      }
    });
  </script>
</body>
</html>
