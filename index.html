  <style>

    /* ====== 側拉式選單 ====== */
    .side-menu-button {
      position: fixed;
      left: 14px;
      top: 14px;
      z-index: 1200;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #242424;
      color: #ffffff;
      border: 1px solid #444;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }
    .side-menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.62);
      z-index: 1300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .side-menu {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 280px;
      max-width: 82vw;
      background: #161616;
      border-right: 1px solid #333;
      z-index: 1301;
      transform: translateX(-100%);
      transition: transform 0.22s ease;
      box-shadow: 12px 0 32px rgba(0,0,0,0.55);
      padding: 18px;
      box-sizing: border-box;
      overflow-y: auto;
    }
    body.side-menu-open .side-menu-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    body.side-menu-open .side-menu {
      transform: translateX(0);
    }
    .side-menu-title {
      color: #ffffff;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .side-menu-subtitle {
      color: #999;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 18px;
    }
    .side-menu-section {
      color: #8d8d8d;
      font-size: 12px;
      font-weight: 700;
      margin: 16px 0 8px;
    }
    .side-menu-link {
      display: block;
      text-decoration: none;
      color: #e8e8e8;
      background: #202020;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 13px;
      margin-bottom: 10px;
      font-size: 15px;
      font-weight: 700;
    }
    .side-menu-link:hover {
      background: #2a2a2a;
    }
    .side-menu-link.active {
      border-color: #3d7eff;
      background: rgba(61,126,255,0.18);
      color: #ffffff;
    }
    .side-menu-close {
      width: 100%;
      margin-top: 8px;
    }
    @media (max-width: 600px) {
      .side-menu-button {
        left: 10px;
        top: 10px;
        width: 42px;
        height: 42px;
      }
      .auth-card {
        margin-top: 56px;
      }
    }
    /* ====== 刪除配置對話框 ====== */
    @keyframes modalSlideUp {
      from { transform: translate(-50%, calc(-50% + 20px)); opacity: 0; }
      to   { transform: translate(-50%, -50%);              opacity: 1; }
    }
    @keyframes modalSheetUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    #deleteConfigModalBackdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 999;
    }
    #deleteConfigModalBox {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: #1f1f1f;
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 24px;
      width: 340px;
      max-width: 92vw;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      animation: modalSlideUp 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #deleteConfigModalTitle {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
    }
    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .modal-field label {
      font-size: 13px;
      color: #aaaaaa;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .modal-actions button {
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 700;
    }
    .modal-field select,
    .modal-field input {
      width: 100%;
      box-sizing: border-box;
    }
    @media (max-width: 600px) {
      #deleteConfigModalBox {
        width: 100%;
        max-width: 100%;
        border-radius: 18px 18px 0 0;
        top: auto;
        bottom: 0;
        left: 0;
        transform: none;
        animation: modalSheetUp 0.25s ease;
        padding: 24px 20px 32px 20px;
      }
      .modal-actions {
        flex-direction: column-reverse;
        gap: 10px;
      }
      .modal-actions button {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        min-height: 48px;
      }

    <h3>陀螺配置</h3>

    <div class="input-row">

      <input type="text" id="layer" placeholder="上蓋">

      <input type="text" id="lock" placeholder="紋章鎖">

    <div class="table-wrap">

            <th>金屬戰刃</th>

    <h3>零件庫存表</h3>

    <div class="part-input-row">
      <select id="partType">

        <option value="紋章鎖">紋章鎖</option>
        <option value="主要戰刃">主要戰刃</option>
        <option value="超越戰刃">超越戰刃</option>
        <option value="金屬戰刃">金屬戰刃</option>
        <option value="輔助戰刃">輔助戰刃</option>

  <script>

  <script>
    // 1. 避免選填零件用「-」代表空值時，被拿去做主要戰刃庫存檢查。
    // 2. CX-07、UX-19 本身沒有固鎖，允許固鎖選「-」並略過固鎖庫存檢查。
    (function () {
      const originalIncludes = String.prototype.includes;
      String.prototype.includes = function (searchString, position) {
        if (String(this) === "-" && searchString === "/") return true;
        return originalIncludes.call(this, searchString, position);
      };

      Object.defineProperty(Object.prototype, "__NO_RATCHET_TOTAL__", {
        configurable: true,
        get: function () { return 999999; }
      });

      Object.defineProperty(Object.prototype, "__NO_RATCHET_USED__", {
        configurable: true,
        get: function () { return 0; }
      });

      function normalizeNoRatchetModel(model) {
        const text = String(model || "").trim().toUpperCase().replace(/\s+/g, " ");
        const match = text.match(/^(CX|UX)\s*-?\s*(\d+)/);
        if (!match) return text;
        return `${match[1]}-${String(Number(match[2])).padStart(2, "0")}`;
      }

      function isNoRatchetModel() {
        const model = normalizeNoRatchetModel(document.getElementById("confModel")?.value || "");
        return model === "CX-07" || model === "UX-19";
      }

      function makeNoRatchetValue() {
        let readCount = 0;
        return {
          toString: function () { return "-"; },
          valueOf: function () { return "-"; },
          [Symbol.toPrimitive]: function () {
            readCount += 1;
            if (readCount === 1) return "__NO_RATCHET_TOTAL__";
            if (readCount === 2) return "__NO_RATCHET_USED__";
            return "-";
          }
        };
      }

      const valueDescriptor = Object.getOwnPropertyDescriptor(HTMLSelectElement.prototype, "value");
      Object.defineProperty(HTMLSelectElement.prototype, "value", {
        configurable: true,
        get: function () {
          const value = valueDescriptor.get.call(this);
          if (this.id === "sel固鎖" && value === "-" && isNoRatchetModel()) {
            return makeNoRatchetValue();
          }
          return value;
        },
        set: function (value) {
          return valueDescriptor.set.call(this, value);
        }
      });

      function ensureNoRatchetOption() {
        const select = document.getElementById("sel固鎖");
        if (!select || select.querySelector('option[value="-"]')) return;

        const option = document.createElement("option");
        option.value = "-";
        option.textContent = "無固鎖（-）";
        select.insertBefore(option, select.children[1] || null);
      }

      document.addEventListener("DOMContentLoaded", function () {
        ensureNoRatchetOption();
        setInterval(ensureNoRatchetOption, 500);
      });
    })();
  </script>
  <script type="module" src="script.js?v=20260625-no-ratchet-fix1"></script>
</body>
