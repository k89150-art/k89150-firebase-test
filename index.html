<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>戰鬥陀螺管理表</title>

  <link rel="stylesheet" href="style.css" />
  <style>
    /* ====== 刪除配置對話框 ====== */
    @keyframes modalSlideUp {
      from { transform: translate(-50%, calc(-50% + 20px)); opacity: 0; }
      to   { transform: translate(-50%, -50%);              opacity: 1; }
    }
    @keyframes modalSheetUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    #deleteConfigModalBackdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 999;
    }
    #deleteConfigModalBox {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: #1f1f1f;
      border: 1px solid #3a3a3a;
      border-radius: 14px;
      padding: 24px;
      width: 340px;
      max-width: 92vw;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      animation: modalSlideUp 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #deleteConfigModalTitle {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
    }
    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .modal-field label {
      font-size: 13px;
      color: #aaaaaa;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .modal-actions button {
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 700;
    }
    .modal-field select,
    .modal-field input {
      width: 100%;
      box-sizing: border-box;
    }
    @media (max-width: 600px) {
      #deleteConfigModalBox {
        width: 100%;
        max-width: 100%;
        border-radius: 18px 18px 0 0;
        top: auto;
        bottom: 0;
        left: 0;
        transform: none;
        animation: modalSheetUp 0.25s ease;
        padding: 24px 20px 32px 20px;
      }
      .modal-actions {
        flex-direction: column-reverse;
        gap: 10px;
      }
      .modal-actions button {
        width: 100%;
        padding: 14px;
        font-size: 16px;
        min-height: 48px;
      }
    }
  </style>
</head>
<body>
  
  <div id="authArea" class="auth-card">
  <div class="auth-main">
    <div>
      <div class="auth-title">雲端同步</div>

      <div id="userInfo" class="auth-user" style="display:none;">
        已登入：<strong id="userEmail"></strong>
      </div>

      <div id="syncStatus" class="auth-status status-muted">
        尚未登入
      </div>
    </div>

    <div class="auth-actions">
      <button id="googleLoginBtn" class="primary-btn">使用 Google 登入</button>
      <button id="logoutBtn" class="danger-btn" style="display:none;">登出</button>
    </div>
  </div>

</div>

  <div class="container">
    <h2>戰鬥陀螺管理表</h2>

    <h3>陀螺配置</h3>

    <div class="input-row">
      <input type="text" id="model" placeholder="型號，例如 CX-01、UX-01">
      <input type="text" id="layer" placeholder="上蓋">

      <input type="text" id="lock" placeholder="紋章鎖">
      <input type="text" id="primaryBlade" placeholder="主要戰刃">
      <input type="text" id="transcendBlade" placeholder="超越戰刃">
      <input type="text" id="metalBlade" placeholder="金屬戰刃">
      <input type="text" id="aux" placeholder="輔助戰刃">

      <input type="text" id="fix" placeholder="固鎖">
      <input type="text" id="axis" placeholder="軸心">

      <button onclick="addRow()">新增</button>
    </div>

    <div class="table-wrap">
      <table id="beybladeTable">
        <thead>
          <tr>
            <th>型號</th>
            <th>上蓋</th>
            <th>紋章鎖</th>
            <th>主要戰刃</th>
            <th>超越戰刃</th>
            <th>金屬戰刃</th>
            <th>輔助戰刃</th>
            <th>固鎖</th>
            <th>軸心</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <h3>零件庫存表</h3>

    <div class="part-input-row">
      <select id="partType">
        <option value="上蓋">上蓋</option>
        <option value="紋章鎖">紋章鎖</option>
        <option value="主要戰刃">主要戰刃</option>
        <option value="超越戰刃">超越戰刃</option>
        <option value="金屬戰刃">金屬戰刃</option>
        <option value="輔助戰刃">輔助戰刃</option>
        <option value="固鎖">固鎖</option>
        <option value="軸心">軸心</option>
      </select>

      <input type="text" id="partName" placeholder="零件名稱">
      <input type="number" id="partCount" min="1" step="1" inputmode="numeric" placeholder="數量">
      <button onclick="addPart()">新增零件</button>
    </div>

    <div class="table-wrap">
      <table id="partTable">
        <thead>
          <tr>
            <th>類別</th>
            <th>零件名稱</th>
            <th>數量</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <h3>配置紀錄區</h3>

    <div id="config-selector">
      <input type="text" id="confModel" placeholder="輸入陀螺型號">

      <select id="sel上蓋">
        <option value="">選擇上蓋</option>
      </select>

      <select id="sel紋章鎖">
        <option value="">選擇紋章鎖</option>
      </select>

      <select id="sel主要戰刃">
        <option value="">選擇主要戰刃</option>
      </select>

      <select id="sel超越戰刃">
        <option value="">選擇超越戰刃</option>
      </select>

      <select id="sel金屬戰刃">
        <option value="">選擇金屬戰刃</option>
      </select>

      <select id="sel輔助戰刃">
        <option value="">選擇輔助戰刃</option>
      </select>

      <select id="sel固鎖">
        <option value="">選擇固鎖</option>
      </select>

      <select id="sel軸心">
        <option value="">選擇軸心</option>
      </select>

      <button onclick="addConfig()">加入配置表</button>
    </div>

    <div class="table-wrap">
      <table id="configTable">
        <thead>
          <tr>
            <th>型號</th>
            <th>上蓋</th>
            <th>紋章鎖</th>
            <th>主要戰刃</th>
            <th>超越戰刃</th>
            <th>金屬戰刃</th>
            <th>輔助戰刃</th>
            <th>固鎖</th>
            <th>軸心</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <h3>歷史測試紀錄</h3>

    <div class="history-note">
      這裡會記錄曾經拆掉的配置。下次如果再加入相同組合，系統會提醒你以前測試過。
    </div>

    <div class="table-wrap">
      <table id="historyTable">
        <thead>
          <tr>
            <th>型號</th>
            <th>組合</th>
            <th>固鎖</th>
            <th>軸心</th>
            <th>結果</th>
            <th>備註</th>
            <th>日期</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- 刪除配置原因對話框 -->
  <div id="deleteConfigModal" style="display:none;">
    <div id="deleteConfigModalBackdrop"></div>
    <div id="deleteConfigModalBox">
      <div id="deleteConfigModalTitle">移除配置原因</div>
      <div class="modal-field">
        <label for="deleteReasonSelect">原因</label>
        <select id="deleteReasonSelect">
          <option value="">請選擇原因</option>
          <option value="不好用">不好用</option>
          <option value="好用，暫時拆掉">好用，暫時拆掉測其他組合</option>
          <option value="普通 / 無感">普通 / 無感</option>
          <option value="打錯，不記錄">打錯，不記錄</option>
        </select>
      </div>
      <div class="modal-field" id="deleteNoteField">
        <label for="deleteNoteInput">備註（選填）</label>
        <input type="text" id="deleteNoteInput" placeholder="例如：太容易爆、持久不夠、攻擊不穩">
      </div>
      <div class="modal-actions">
        <button id="deleteConfigCancelBtn" class="danger-btn">取消</button>
        <button id="deleteConfigConfirmBtn" class="primary-btn">確認刪除</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js?v=20260621-part-count"></script>
</body>
</html>
