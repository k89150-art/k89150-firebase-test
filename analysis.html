<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>配置分析｜戰鬥陀螺管理表</title>
  <link rel="stylesheet" href="style.css?v=20260629-mobile-actions1" />
  <link rel="stylesheet" href="site-menu.css" />
  <style>
    .analysis-page { margin-top: 68px; }
    .analysis-panel { background:#181818; border:1px solid #333; border-radius:8px; padding:16px; margin-bottom:14px; line-height:1.7; }
    .analysis-note { color:#aaa; font-size:13px; margin-top:6px; }
    .mode-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .mode-tab { background:#242424; color:#ddd; border:1px solid #444; border-radius:8px; padding:9px 12px; font-weight:700; }
    .mode-tab.active { background:#3d7eff; color:#fff; border-color:#3d7eff; }
    .analysis-form-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; }
    .analysis-field { display:flex; flex-direction:column; gap:5px; min-width:0; }
    .analysis-field label { color:#cfcfcf; font-size:13px; font-weight:700; }
    .analysis-field input { width:100%; box-sizing:border-box; }
    .analysis-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .pill-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
    .analysis-pill { display:inline-flex; align-items:center; padding:3px 8px; border-radius:999px; background:rgba(61,126,255,.16); border:1px solid rgba(61,126,255,.35); color:#dbe7ff; font-size:12px; font-weight:700; }
    .status-list { margin:10px 0 0; padding-left:20px; }
    .status-list li { margin-bottom:6px; }
    .status-good { color:#69db7c; }
    .status-warn { color:#ffd43b; }
    .status-bad { color:#ff8787; }
    .section-title { margin-top:18px; margin-bottom:6px; font-size:16px; border-left:4px solid #3d7eff; padding-left:8px; color:#fff; }
    .score-card-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; margin-top:12px; }
    .score-card { background:#151515; border:1px solid #303030; border-radius:8px; padding:12px; }
    .score-card-top { display:flex; justify-content:space-between; gap:8px; align-items:center; margin-bottom:8px; }
    .score-card-name { color:#fff; font-weight:800; }
    .score-card-value { color:#dbe7ff; font-weight:800; }
    .score-bar { height:8px; border-radius:999px; background:#292929; overflow:hidden; }
    .score-bar-fill { height:100%; border-radius:999px; background:#3d7eff; }
    .result-card { background:#151515; border:1px solid #303030; border-radius:8px; padding:12px; margin-top:10px; }
    @media (max-width:700px){
      .analysis-form-grid, .score-card-grid { grid-template-columns:1fr; }
      .analysis-actions button, .mode-tab { width:100%; }
    }
  </style>
</head>
<body>
  <div class="container analysis-page">
    <h2>配置分析</h2>

    <div class="analysis-panel">
      <div>輸入想測試的配置，系統會依照零件定位、相性與風險規則產生分析結果。這不是勝率保證，而是幫你判斷方向是否合理。</div>
      <div class="analysis-note">支援 BX / UX 標準配置，以及 CX 主要戰刃、金屬戰刃 + 超越戰刃兩種模式。</div>
    </div>

    <div class="analysis-panel">
      <div class="mode-tabs" role="tablist" aria-label="配置模式">
        <button type="button" class="mode-tab active" data-mode="standard">BX / UX 配置</button>
        <button type="button" class="mode-tab" data-mode="cx-main">CX 主要戰刃</button>
        <button type="button" class="mode-tab" data-mode="cx-split">CX 金屬 + 超越</button>
      </div>

      <div id="standardFields" class="analysis-form-grid">
        <div class="analysis-field">
          <label for="bladeInput">上蓋</label>
          <input id="bladeInput" list="bladeOptions" type="text" placeholder="例如 魔導神杖">
        </div>
        <div class="analysis-field">
          <label for="standardRatchetInput">固鎖</label>
          <input id="standardRatchetInput" list="ratchetOptions" type="text" placeholder="例如 9-60；UX-19 / Op / Tr 可留空">
        </div>
        <div class="analysis-field">
          <label for="standardBitInput">軸心</label>
          <input id="standardBitInput" list="bitOptions" type="text" placeholder="例如 B">
        </div>
      </div>

      <div id="cxMainFields" class="analysis-form-grid" style="display:none;">
        <div class="analysis-field"><label for="cxMainLockInput">紋章鎖</label><input id="cxMainLockInput" list="cxLockOptions" type="text" placeholder="選擇紋章鎖"></div>
        <div class="analysis-field"><label for="cxMainBladeInput">主要戰刃</label><input id="cxMainBladeInput" list="cxMainBladeOptions" type="text" placeholder="選擇主要戰刃"></div>
        <div class="analysis-field"><label for="cxMainAssistInput">輔助戰刃</label><input id="cxMainAssistInput" list="cxAssistOptions" type="text" placeholder="例如 H"></div>
        <div class="analysis-field"><label for="cxMainRatchetInput">固鎖</label><input id="cxMainRatchetInput" list="ratchetOptions" type="text" placeholder="例如 3-60；Op / Tr 可留空"></div>
        <div class="analysis-field"><label for="cxMainBitInput">軸心</label><input id="cxMainBitInput" list="bitOptions" type="text" placeholder="例如 R"></div>
      </div>

      <div id="cxSplitFields" class="analysis-form-grid" style="display:none;">
        <div class="analysis-field"><label for="cxSplitLockInput">紋章鎖</label><input id="cxSplitLockInput" list="cxLockOptions" type="text" placeholder="選擇紋章鎖"></div>
        <div class="analysis-field"><label for="cxMetalInput">金屬戰刃</label><input id="cxMetalInput" list="cxMetalOptions" type="text" placeholder="選擇金屬戰刃"></div>
        <div class="analysis-field"><label for="cxOverInput">超越戰刃</label><input id="cxOverInput" list="cxOverOptions" type="text" placeholder="例如 B"></div>
        <div class="analysis-field"><label for="cxSplitAssistInput">輔助戰刃</label><input id="cxSplitAssistInput" list="cxAssistOptions" type="text" placeholder="例如 K"></div>
        <div class="analysis-field"><label for="cxSplitRatchetInput">固鎖</label><input id="cxSplitRatchetInput" list="ratchetOptions" type="text" placeholder="例如 1-50；Op / Tr 可留空"></div>
        <div class="analysis-field"><label for="cxSplitBitInput">軸心</label><input id="cxSplitBitInput" list="bitOptions" type="text" placeholder="例如 I"></div>
      </div>

      <div class="analysis-actions">
        <button id="analyzeBtn" type="button" class="primary-btn">分析配置</button>
        <button id="clearBtn" type="button" class="secondary-btn">清除</button>
      </div>
    </div>

    <div id="analysisResult" class="analysis-panel" style="display:none;"></div>
  </div>

  <datalist id="bladeOptions"></datalist>
  <datalist id="ratchetOptions"></datalist>
  <datalist id="bitOptions"></datalist>
  <datalist id="cxLockOptions"></datalist>
  <datalist id="cxMainBladeOptions"></datalist>
  <datalist id="cxMetalOptions"></datalist>
  <datalist id="cxOverOptions"></datalist>
  <datalist id="cxAssistOptions"></datalist>

  <script src="site-menu.js?v=20260630-engine2"></script>
  <script type="module" src="analysis.js?v=20260630-analysis-utf8-1"></script>
</body>
</html>
